name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly full regression test at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Manual trigger

jobs:
  # ========== Tests ==========
  test:
    name: Test Suite (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist numpy pandas scipy scikit-learn yfinance matplotlib
      
      - name: Run unit tests
        run: |
          pytest tests/test_greeks.py -v --tb=short
      
      - name: Run strategy tests
        run: |
          pytest tests/test_comprehensive.py::TestStrategyScanner -v --tb=short
      
      - name: Run backtester tests
        run: |
          pytest tests/test_comprehensive.py::TestBacktester -v --tb=short --durations=10
      
      - name: Run paper trader tests
        run: |
          pytest tests/test_comprehensive.py::TestPaperTrader -v --tb=short
      
      - name: Run integration tests
        run: |
          pytest tests/test_comprehensive.py::TestIntegration -v --tb=short
      
      - name: Run regression tests
        run: |
          pytest tests/test_comprehensive.py::TestRegression -v --tb=short
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py-${{ matrix.python-version }}-${{ matrix.os }}
          path: |
            .coverage
            htmlcov/
            test-reports/
          retention-days: 7
  
  # ========== Code Quality ==========
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install linters
        run: |
          pip install black isort flake8 mypy bandit safety
      
      - name: Format check (black)
        run: |
          black --check src/ tests/ || true
      
      - name: Import sort check (isort)
        run: |
          isort --check-only src/ tests/ || true
      
      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Type check (mypy)
        run: |
          mypy src/ --ignore-missing-imports || true
  
  # ========== Security Scan ==========
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bandit security scan
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -ll
  
      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --exclude-files 'requirements.txt|.github/workflows/' > secrets.json || true
          cat secrets.json
  
  # ========== Performance Baseline ==========
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    # Only run on main branch
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4'
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pandas numpy pytest-benchmark
      
      - name: Run performance benchmarks
        run: |
          pytest tests/test_comprehensive.py::TestPerformance -v --benchmark-only
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/
          retention-days: 30
  
  # ========== Docker Build ==========
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    # Only on main branch
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub (optional)
        if: secrets.DOCKERHUB_USERNAME
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            optionsdetective:latest
            optionsdetective:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  # ========== Notify ==========
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, lint, security, benchmark, docker]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "### CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Lint:** ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Security:** ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker:** ${{ needs.docker.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
